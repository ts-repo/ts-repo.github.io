<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feed Log プライバシーポリシー</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; margin: 0; color: #111827; background: #f8fafc; }
      main { max-width: 760px; margin: 0 auto; padding: 56px 20px; }
      h1 { font-size: 32px; margin: 0 0 8px; }
      h2 { font-size: 20px; margin-top: 32px; }
      p, li { line-height: 1.8; }
      a { color: #2563eb; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-top: 20px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Feed Log プライバシーポリシー</h1>
      <p>このページは、えさやりログ（Feed Log）のプライバシーポリシーです。</p>
      <section class="card">
        <h2>データの保存</h2>
        <p>本アプリで作成した記録は、ユーザーの端末内に保存されます。開発者が記録内容を収集、閲覧、外部送信することはありません。</p>
      </section>
      <section class="card">
        <h2>写真・カメラ</h2>
        <p>写真やカメラを利用する機能がある場合、ユーザーが明示的に選択したときのみアクセスします。</p>
      </section>
      <section class="card">
        <h2>バックアップ</h2>
        <p>エクスポートやインポート機能がある場合、バックアップファイルの保存や共有はユーザー操作によって行われます。</p>
      </section>
      <section class="card">
        <h2>お問い合わせ</h2>
        <p><a href="mailto:tsuruapps.support@gmail.com">tsuruapps.support@gmail.com</a></p>
      </section>
    </main>
  </body>
</html>
